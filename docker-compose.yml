version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: mercado-publico-db
    restart: unless-stopped

    environment:
      POSTGRES_USER: usuario
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mercado_publico
      POSTGRES_INITDB_ARGS: "-E UTF8"

    ports:
      - "5432:5432"

    volumes:
      # Persistir datos entre reinicios
      - postgres_data:/var/lib/postgresql/data
      # Opcional: Scripts de inicialización
      # - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usuario -d mercado_publico"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - mercado-publico-network

  # PgAdmin - Interfaz gráfica para administrar PostgreSQL (opcional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mercado-publico-pgadmin
    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'

    ports:
      - "5050:80"

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - mercado-publico-network

    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  mercado-publico-network:
    driver: bridge

# Comandos útiles:
#
# docker-compose up -d              → Iniciar servicios en background
# docker-compose down               → Detener y remover contenedores
# docker-compose logs -f            → Ver logs en tiempo real
# docker-compose logs postgres      → Ver logs de PostgreSQL
# docker-compose ps                 → Listar contenedores activos
# docker-compose exec postgres psql -U usuario -d mercado_publico
#                                   → Conectarse a PostgreSQL
#
# PgAdmin disponible en: http://localhost:5050
# Credenciales PgAdmin: admin@example.com / admin
